<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KorpoChat - Workspace</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <!-- Authentication View -->
    <div id="auth-view" class="auth-container">
        <div class="auth-card">
            <h2>Witaj w KorpoChat!</h2>
            <form id="login-form">
                <div class="form-group">
                    <label for="login-username">Login</label>
                    <input type="text" id="login-username" required autocomplete="username">
                </div>
                <div class="form-group">
                    <label for="login-password">Hasło</label>
                    <input type="password" id="login-password" required autocomplete="current-password">
                </div>
                <button type="submit" class="btn-primary">Wejdź</button>
            </form>
        </div>
    </div>
    <!-- Main Application View -->
    <div id="app-view" class="app-container hidden">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>KorpoChat</h2> 
                <button id="logout-btn" class="btn-small">Wyloguj</button>
            </div>
            
            <div class="admin-controls hidden" id="admin-controls">
                <button id="go-to-admin-btn" class="btn-secondary" style="width: 100%; margin: 10px 0;">Panel Administratora</button>
            </div>

            <ul class="channel-list" id="channel-list">
                <li class="channel active">#główny</li>
            </ul>
        </aside>
        <!-- chat area - main content/ -->
        <main class="chat-area">
            <header class="chat-header">
                <button id="sidebar-toggle-btn" class="hamburger-btn" aria-label="Toggle Menu">☰</button>
                <h3 id="current-channel-name">#główny</h3>
            </header>
            <div class="chat-messages" id="chat-messages">
                <div class="message"> wersja MVP!</div>
            </div>
            <form class="chat-input-wrapper" id="chat-form">
                <input type="text" id="message-input" placeholder="Wpisz wiadomość..." autocomplete="off" required>
                <button type="submit">Wyślij!</button>
            </form>
        </main>
    </div>
    <!-- Admin Panel View (hidden by default) -->
    <div id="admin-view" class="app-container hidden">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>Panel Administratora</h2>
                <button id="back-to-chat-btn" class="btn-small">Wróć do czatu</button>
            </div>
            <ul class="channel-list">
                <li class="channel active">Zarządzanie Użytkownikami</li>
                </ul>
        </aside>

        <main class="chat-area" style="padding: 20px; background-color: #f8f9fa;">
            <h2>Panel Zarządzania</h2>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px;">

                <div class="admin-card" style="margin: 0;">
                    <h3>Dodaj Nowego Pracownika</h3>
                    <form id="add-user-form" style="display: flex; flex-direction: column; gap: 10px; margin-top: 15px;">
                        <div class="form-group" style="margin-bottom: 0;">
                            <label>Login</label>
                            <input type="text" id="new-username" required>
                        </div>
                        <div class="form-group" style="margin-bottom: 0;">
                            <label>Hasło startowe</label>
                            <input type="password" id="new-password" required>
                        </div>
                        <div class="form-group" style="margin-bottom: 0;">
                            <label>Rola</label>
                            <select id="new-role" style="padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 1rem;">
                                <option value="USER">User</option>
                                <option value="ADMIN">Admin</option>
                            </select>
                        </div>
                        <div class="form-group" style="margin-bottom: 0;">
                            <label>Tagi / Działy</label>
                            <input type="text" id="new-tags" placeholder="np. IT, HR">
                        </div>
                        <button type="submit" class="btn-primary" style="margin-top: 10px;">Zarejestruj użytkownika</button>
                    </form>
                </div>

                <div class="admin-card" style="margin: 0;">
                    <h3>Dodaj Nowy Kanał</h3>
                    <form id="add-channel-form" style="display: flex; flex-direction: column; gap: 10px; margin-top: 15px;">
                        <div class="form-group" style="margin-bottom: 0;">
                            <label>Nazwa Kanału</label>
                            <input type="text" id="channel-name" placeholder="np. #ogólny-it" required>
                        </div>
                        <div class="form-group" style="margin-bottom: 0;">
                            <label>Opis</label>
                            <input type="text" id="channel-desc" placeholder="Krótki opis...">
                        </div>
                        <div class="form-group" style="margin-bottom: 0;">
                            <label>Działy (tagi)</label>
                            <input type="text" id="channel-tags-input" placeholder="np. IT, HR (po przecinku)">
                        </div>
                        <div style="flex-grow: 1;"></div>
                        <button type="submit" class="btn-primary" style="margin-top: 10px;">Stwórz kanał</button>
                    </form>
                </div>

            </div>

            <div class="admin-card" style="margin-top: 20px;">
                <h3>Lista Użytkowników</h3>
                <div class="table-wrapper">
                <table class="admin-table" style="width: 100%; text-align: left; border-collapse: collapse;">
                    <thead>
                        <tr style="border-bottom: 2px solid #ccc;">
                            <th>Użytkownik</th>
                            <th>Rola</th>
                            <th>Tagi</th>
                            <th>Status</th>
                            <th>Ostatnio widziany</th>
                            <th>Akcje</th>
                        </tr>
                    </thead>
                <tbody id="user-table-body">
                    
                </tbody>
            </table>
            </div>
            </div>
        </main>
    </div>
    <!-- Include SockJS and STOMP.js from CDN for WebSocket communication -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.6.1/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <script type="module" src="js/app.js"></script>
</body>
</html>
