services:
  # ==========================================
  # 1. Database Service (PostgreSQL)
  # ==========================================
  db:
    image: postgres:15-alpine
    container_name: korpochat_db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: heliotrop23
      POSTGRES_DB: korpochat
    ports:
      # Mapping host port 5432 to container port 5432
      - "5432:5432"
    volumes:
      # This ensures database data survives container restarts
      - postgres_data:/var/lib/postgresql/data
      # This auto-executes our SQL script to create tables on first run
      - ./db-init/init.sql:/docker-entrypoint-initdb.d/init.sql

  # ==========================================
  # 2. Backend Service (Java Spring Boot)
  # uncomment and configure if you want to build the backend container from a Dockerfile
  # ==========================================
  # backend:
  #   # container built from Dockerfile in /backend folder, not using pre-built image
  #   build: ./backend
  #   container_name: korpochat_backend
  #   restart: on-failure
  #   depends_on:
  #     - db
  #   ports:
  #     - "8080:8080"
  #   environment:
  #     # Injecting database credentials into Spring Boot
  #     SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/korpochat
  #     SPRING_DATASOURCE_USERNAME: admin
  #     SPRING_DATASOURCE_PASSWORD: heliotrop23
  #     # Ensuring Hibernate only validates our manual SQL schema
  #     SPRING_JPA_HIBERNATE_DDL_AUTO: validate

  # ==========================================
  # 3. Frontend Service (Vanilla JS / Nginx )
  # ==========================================
  frontend:
    image: nginx:alpine
    container_name: korpochat_frontend
    ports:
      # Mapping host port 80 to container port 80
      - "80:80"
    volumes:
      # Mounting local /frontend folder into the Nginx container
      - ./frontend:/usr/share/nginx/html:ro
    restart: unless-stopped

# Define the named volume for persistent database storage
volumes:
  postgres_data: