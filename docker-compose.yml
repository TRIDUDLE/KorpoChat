services:
  # ==========================================
  # 1. Database Service (PostgreSQL)
  # ==========================================
  db:
    image: postgres:15-alpine
    container_name: korpochat_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER-admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME-korpochat}
    ports:
      - "5432:5432"
    networks:
      - backend_net
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db-init/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ==========================================
  # 2. Backend Service (Java Spring Boot)
  # ==========================================
  backend:
    build: ./backend
    container_name: korpochat_backend
    restart: on-failure
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"
    networks:
      - backend_net
      - frontend_net
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${DB_NAME-korpochat}
      SPRING_DATASOURCE_USERNAME: ${DB_USER-admin}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate

  # ==========================================
  # 3. Frontend Service (Vanilla JS / Nginx)
  # ==========================================
  frontend:
    image: nginx:alpine
    container_name: korpochat_frontend
    ports:
      - "80:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - frontend_net
    restart: unless-stopped

networks:
  backend_net:
    driver: bridge
  frontend_net:
    driver: bridge

volumes:
  postgres_data: